name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Dependabot PRs may have a stale bun.lock until the fixup workflow pushes;
      # fall back to a non-frozen install for those.
      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi
      - name: Biome CI
        run: bunx biome ci .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi
      - name: TypeScript
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Placeholder values so `next build` can import modules that read env at load time.
      # No connection is made at build time.
      MONGODB_URI: mongodb://localhost:27017/ci
      BETTER_AUTH_SECRET: ci-only-secret-not-used-in-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi
      - name: Build
        run: bun run build
