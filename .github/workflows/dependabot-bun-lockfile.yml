# Dependabot's native bun support is unreliable: it updates package.json but often
# leaves bun.lock stale (or produces a broken one). This workflow re-runs `bun install`
# on every Dependabot PR and pushes the regenerated bun.lock back to the PR branch.
#
# Note: pushes made with the default GITHUB_TOKEN do not re-trigger CI workflows.
# If you want CI to re-run on the lockfile commit automatically, create a PAT with
# `contents: write` on this repo and save it as the DEPENDABOT_LOCKFILE_TOKEN secret;
# the workflow prefers it when present. Otherwise, close/reopen the PR (or push any
# commit) to re-run CI — the CI workflow also installs non-frozen for dependabot PRs
# as a safety net.
name: Dependabot bun lockfile

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  fix-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.DEPENDABOT_LOCKFILE_TOKEN || github.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Regenerate bun.lock from package.json
        run: bun install

      - name: Commit and push lockfile if changed
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): regenerate bun.lock for dependabot"
          git push
