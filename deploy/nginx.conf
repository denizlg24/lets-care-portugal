# /etc/nginx/sites-available/lets-care
# Reverse proxy -> Next.js (bun) on 127.0.0.1:3000
# After installing this, run certbot --nginx; it will inject the 443 block + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name lets-care-portugal.letras.up.pt;

    # Media / PDF uploads. Raise if you accept larger files.
    client_max_body_size 25M;

    # Long-cache immutable Next build assets.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        # No WebSocket upgrade headers: Next.js prod has no WS (that's dev HMR),
        # and a hardcoded `Connection: upgrade` makes App Router RSC navigations
        # hang forever waiting on an upgrade that never happens.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;   # flush the RSC/stream progressively
    }
}
